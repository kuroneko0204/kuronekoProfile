<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!--Header-->
<header>
    <h1 class="logo">
        KURONEKO Profile
    </h1>
    
    <nav>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#bicycle">Bicycle</a></li>
        </ul>
    </nav>
</header>

<!--Main Visual-->
<section class="main-visual">
    <img src="mainvisual.jpg" alt="メイン画像">
</section>

<!--About-->
<section class="about" id="about">
    <h1>About</h1>

    <div class="about-content">
        <img src="about.jpg" alt="プロフィール写真">

        <div class="text">
            <h3>KURONEKO
            </h3>
            <p>
            初めての模写コーディング            
            </p>
        </div>
    </div>
</section>

<!--Bicycle-->
<section class="bicycle" id="bicycle">
    <h1>Bicycle</h1>

    <div class="bicycle-list">

        <div class="bicycle-item">
            <img src="bicycle1.jpg" alt="自転車1">
            <h3>大人っぽくて憧れ</h3>
            <p>小学生低学年で乗れるようにしてくれた親に感謝</p>
        </div>

        <div class="bicycle-item">
            <img src="bicycle2.jpg" alt="自転車2">
            <h3>バイト先の自転車</h3>
            <p>椅子の高さが違うから慣れなかったな</p>
        </div>

        <div class="bicycle-item">
            <img src="bicycle3.jpg" alt="自転車3">
            <h3>ロードバイク</h3>
            <p>憧れのまま終わった</p>
        </div>
    </div>
</section>
<!--Footer-->
<footer>
    <p>© 2026 Profile</p>

</footer>


</body>
</html>
